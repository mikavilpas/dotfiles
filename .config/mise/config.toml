settings.cargo.binstall = true
settings.cargo.binstall_only = true
settings.experimental = true

settings.dotfiles.root = "~/dotfiles"
settings.dotfiles.default_mode = "symlink"

[dotfiles]
# ~/.npmrc is intentionally NOT managed here: the real ~/.npmrc holds secret
# authTokens that must never be committed, and the repo .npmrc only sets the
# default registry (which npm uses anyway). Leave the home file untouched.

# List everything explicitly. This is annoying but clear, and avoids bad
# surprises completely.
#
# Manage with:
# $ mise dotfiles apply --dry-run

"~/.config/aerospace" = {}
"~/.config/atuin" = {}
"~/.config/bat" = {}
"~/.config/delta" = {}
"~/.config/fd" = {}
"~/.config/fish" = {}
"~/.config/husky" = {}
"~/.config/lazygit" = {}
"~/.config/mise" = {}
"~/.config/nvim" = {}
"~/.config/presenterm" = {}
"~/.config/starship.toml" = {}
"~/.config/wezterm" = {}
"~/.config/yazi" = {}
"~/.fdignore" = {}
"~/.gitattributes" = {}
"~/.gitconfig" = {}
"~/.rgignore" = {}
"~/.typos.toml" = {}
"~/.zshrc" = {}
"~/Library/Application Support/org.dystroy.bacon" = {}

# Pick tools that renovate can manage updates for. See:
# https://docs.renovatebot.com/modules/manager/mise/
[tools]
# let renovate manage the version for mise itself. Note that in a new
# installation this is a chicken-and-egg issue, so mise will need to be
# bootstrapped with e.g. homebrew for the first installation.
"aqua:jdx/mise" = "2026.6.12"

# renovate: datasource=crate depName=bacon
"cargo:bacon" = "3.22.0"
# renovate: datasource=crate depName=cargo-nextest
"cargo:cargo-nextest" = "0.9.117"
# renovate: datasource=crate depName=eza
"cargo:eza" = "0.23.3"

"aqua:Schniz/fnm" = "1.39.0"
"aqua:fish-shell/fish-shell" = "4.7.1"
"aqua:mfontanini/presenterm" = "0.16.1"
"aqua:ouch-org/ouch" = "0.8.0"
"github:aaronriekenberg/rust-parallel" = "1.23.0"
"github:afshinm/zerobox" = "0.3.3"
"github:ankitpokhrel/jira-cli" = { version = "1.7.0", exe = "jira" }
"github:k1LoW/git-wt" = "0.29.0"
"github:pranshuparmar/witr" = "0.3.2"
