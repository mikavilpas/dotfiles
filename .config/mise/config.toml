settings.cargo.binstall = true
settings.experimental = true

# Pick tools that renovate can manage updates for. See:
# https://docs.renovatebot.com/modules/manager/mise/
[tools]

# let renovate manage the version for mise itself. Note that in a new
# installation this is a chicken-and-egg issue, so mise will need to be
# bootstrapped with e.g. homebrew for the first installation.
"aqua:jdx/mise" = "2026.4.28"

# renovate: datasource=crate depName=bacon
"cargo:bacon" = "3.22.0"
# renovate: datasource=crate depName=cargo-nextest
"cargo:cargo-nextest" = "0.9.117"
# renovate: datasource=crate depName=eza
"cargo:eza" = "0.23.3"
# renovate: datasource=crate depName=sccache
"cargo:sccache" = "0.15.0"

"aqua:ClementTsang/bottom" = "0.12.3"
"aqua:MordechaiHadad/bob" = "4.1.7"
"aqua:Schniz/fnm" = "1.39.0"
"aqua:anthropics/claude-code" = "2.1.126"
"aqua:fish-shell/fish-shell" = "4.6.0"
"aqua:mfontanini/presenterm" = "0.16.1"
"aqua:ouch-org/ouch" = "0.7.1"
"github:BurntSushi/ripgrep" = { version = "15.1.0", exe = "rg" }
"github:JohnnyMorganz/stylua" = "2.4.1"
"github:aaronriekenberg/rust-parallel" = "1.22.0"
"github:afshinm/zerobox" = "0.2.6"
"github:ajeetdsouza/zoxide" = "0.9.9"
"github:ankitpokhrel/jira-cli" = { version = "1.7.0", exe = "jira" }
"github:ast-grep/ast-grep" = "0.42.1"
"github:atuinsh/atuin" = { version = "18.16.0", matching_regex = ".tar.gz$" }
"github:cargo-bins/cargo-binstall" = "1.19.0"
"github:chmln/sd" = "1.1.0"
"github:dandavison/delta" = "0.19.2"
"github:endevco/aube" = "v1.7.0"
"github:hadolint/hadolint" = "2.14.0"
"github:jesseduffield/lazydocker" = "0.25.2"
"github:junegunn/fzf" = "0.72.0"
"github:k1LoW/git-wt" = "0.27.0"
"github:koalaman/shellcheck" = "0.11.0"
"github:lycheeverse/lychee" = "lychee-v0.23.0"
"github:mvdan/sh" = { version = "3.13.1", bin = "shfmt" }
"github:pranshuparmar/witr" = "0.3.1"
"github:rtk-ai/rtk" = "v0.38.0"
"github:rvben/rumdl" = "0.1.87"
"github:sharkdp/bat" = "0.26.1"
"github:sharkdp/fd" = "10.4.2"
"github:sharkdp/hyperfine" = "1.20.0"
"github:sharkdp/vivid" = "0.11.1"
"github:starship/starship" = "1.25.1"
"github:tekumara/typos-lsp" = "0.1.52"
"github:tree-sitter/tree-sitter" = "0.26.8"
"github:watchexec/watchexec" = "2.5.1"
"npm:@fission-ai/openspec" = "1.3.1"
"npm:@fsouza/prettierd" = "0.27.0"
"npm:@typescript/native-preview" = "7.0.0-dev.20260430.1"
"npm:oxlint" = "1.62.0"
"npm:oxlint-tsgolint" = "0.22.1"
"npm:yaml-language-server" = "1.22.0"
"pipx:awslabs.cloudwatch-mcp-server" = "0.0.26"
actionlint = "1.7.12"
aws-cli = { version = "2.34.41", symlink_bins = "true" }
dotenv-linter = "4.0.0"
jq = "1.8.1"
typos = "1.46.0"
uv = "0.11.8"


[tools."github:mikavilpas/dotfiles"]
version = "1.3.1"
exe = "mika"
postinstall = """
mkdir -p ~/.config/fish/completions ~/.config/fish/mika
# run initialization for the fish shell after installing / updating
mika init fish --output-dir ~/.config/fish/mika/
"""

[tools."ubi:gitlab-org/cli"]
version = "1.93.0"
provider = "gitlab"
exe = "glab"
postinstall = """
mkdir -p ~/.config/fish/completions
glab completion -s fish > ~/.config/fish/completions/glab.fish
"""

[tools.github-cli]
version = "2.92.0"
postinstall = """
mkdir -p ~/.config/fish/completions
mise exec -- gh completion --shell fish > ~/.config/fish/completions/gh.fish
"""

[tools.yq]
version = "4.53.2"
postinstall = """
mkdir -p ~/.config/fish/completions
mise exec -- yq completion fish > ~/.config/fish/completions/yq.fish
"""

[tools."github:ducaale/xh"]
version = "0.25.3"
postinstall = """
mkdir -p ~/.config/fish/completions
mise exec -- xh --generate complete-fish > ~/.config/fish/completions/xh.fish
"""
