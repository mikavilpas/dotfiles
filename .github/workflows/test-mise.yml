---
name: Test mise installation of "mika" tool
on:
  pull_request: ~
  push:
    branches:
      - main
  release:
    types: [published]
permissions:
  contents: read

jobs:
  test-mise-install:
    name: Test installing mika with mise
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: false

      - name: Install mika with mise
        # note: the mise config in the repo might apply hooks
        run: mise install "github:mikavilpas/dotfiles@latest" --verbose

      - name: Verify mika is executable
        run: mise exec "github:mikavilpas/dotfiles@latest" -- mika --help
