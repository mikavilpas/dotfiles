---
name: Run cypress tests
on:
  pull_request: ~
  push:
    branches:
      - main

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  CARGO_TERM_COLOR: always

  # mise's `auto_install` etc. cause activation/exec to install every
  # tool in the trusted config. Disable so only `install_args` is honored.
  MISE_AUTO_INSTALL: "false"
  MISE_EXEC_AUTO_INSTALL: "false"
  MISE_NOT_FOUND_AUTO_INSTALL: "false"

permissions: {}

jobs:
  build:
    name: Run tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        neovim_version: ["nightly"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup the mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      # install the "mika" terminal application from source
      - name: Setup Rust toolchain
        run: rustup toolchain install nightly --profile minimal
        working-directory: scripts

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Read mise version from config
        id: mise-version
        shell: bash
        run: |
          VERSION=$(yq '.tools."aqua:jdx/mise"' .config/mise/config.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install tools with mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        env:
          # renovate: datasource=github-releases depName=jesseduffield/lazygit
          LAZYGIT_VERSION: v0.63.1
        with:
          version: ${{ steps.mise-version.outputs.version }}
          mise_toml: |
            [tools]
            lazygit = "${{ env.LAZYGIT_VERSION }}"
          # prettier-ignore
          install_args: >-
            aqua:fish-shell/fish-shell
            delta
            lazygit@${{ env.LAZYGIT_VERSION }}

      - name: Verify installed tools work
        run: |
          echo "mise version: " && mise --version
          echo "lazygit version: " && lazygit --version
          echo "delta version: " && delta --version
          echo "fish version: " && fish --version

      - name: Symlink the dotfiles with mise
        run: mise dotfiles apply --verbose --yes
        env:
          MISE_DOTFILES_ROOT: ${{ github.workspace }}

      - name: Build
        run: cargo install --locked --path scripts/
        working-directory: scripts

      # https://github.com/cypress-io/github-action?tab=readme-ov-file#pnpm-workspaces
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/.cache/Cypress
          key: my-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install

      # need to work around https://github.com/cypress-io/github-action/issues/1246
      - run: pnpm --filter integration-tests exec cypress install
      - run: pnpm tui run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # add the line below to store screenshots only on failures
        # if: failure()
        if: failure()
        with:
          name: cypress-screenshots
          path: integration-tests/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`

  validate-target-branch:
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Validate target branch
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ -z "$BASE_REF" ]]; then
            echo "✓ Not a pull request, skipping target branch validation."
            exit 0
          fi
          if [[ "$BASE_REF" == "main" ]]; then
            echo "✓ PR targets 'main' branch."
            exit 0
          fi

          echo "::error:: The PR must target the main branch to keep stacked branches in order."
          echo "::error:: Please change the target branch to 'main' and re-run the checks."
          echo "::error:: It now targets '$BASE_REF'."
          exit 1
