---
name: Run cypress tests
on:
  pull_request: ~
  push:
    branches:
      - main

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Run tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        neovim_version: ["nightly"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install GNU stow and setup the dotfiles
        run: |
          sudo apt-get install stow tree
          pwd
          ls -la
          echo "Installing dotfiles to HOME $HOME"
          stow --verbose 2 . --target="$HOME"
          echo "Installed dotfiles to HOME $HOME"
          echo "List files in HOME"
          ls -la ~/
          echo "List files in ~/.config"
          ls -la ~/.config/

      - name: Install the fish shell
        run: |
          sudo apt-add-repository ppa:fish-shell/release-4
          sudo apt update
          sudo apt install fish
          echo "Installed fish version $(fish --version)"

      - name: Setup the mold linker
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      # install the "mika" terminal application from source
      - name: Setup Rust toolchain
        run: rustup toolchain install nightly --profile minimal
        working-directory: scripts

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Install tools with UBI
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          # make the tools available for subsequent steps
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
          curl --silent --location \
              "https://raw.githubusercontent.com/houseabsolute/ubi/${UBI_VERSION}/bootstrap/bootstrap-ubi.sh" |
              TARGET="$HOME/.local/bin" sh

          VERSION=$(yq '.tools.yq.version' .config/mise/config.toml)
          ubi --project mikefarah/yq --tag "v$VERSION"

          VERSION=$(yq '.tools."github:dandavison/delta"' .config/mise/config.toml)
          ubi --project dandavison/delta --tag "$VERSION"
          ubi --project jesseduffield/lazygit --tag "${LAZYGIT_VERSION}"

          ls -alR bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # renovate: datasource=github-releases depName=houseabsolute/ubi
          UBI_VERSION: v0.9.0
          # renovate: datasource=github-releases depName=jesseduffield/lazygit
          LAZYGIT_VERSION: v0.61.1

      - name: Build
        run: cargo install --locked --path scripts/
        working-directory: scripts

      # https://github.com/cypress-io/github-action?tab=readme-ov-file#pnpm-workspaces
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/Cypress
          key: my-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install

      # need to work around https://github.com/cypress-io/github-action/issues/1246
      - run: pnpm --filter integration-tests exec cypress install
      - run: pnpm tui run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # add the line below to store screenshots only on failures
        # if: failure()
        if: failure()
        with:
          name: cypress-screenshots
          path: integration-tests/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`

  validate-target-branch:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate target branch
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ -z "$BASE_REF" ]]; then
            echo "✓ Not a pull request, skipping target branch validation."
            exit 0
          fi
          if [[ "$BASE_REF" == "main" ]]; then
            echo "✓ PR targets 'main' branch."
            exit 0
          fi

          echo "::error:: The PR must target the main branch to keep stacked branches in order."
          echo "::error:: Please change the target branch to 'main' and re-run the checks."
          echo "::error:: It now targets '$BASE_REF'."
          exit 1
