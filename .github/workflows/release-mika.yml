name: Release mika

on:
  push:
    branches:
      - main
    paths:
      - "scripts/scripts/Cargo.toml"

permissions: {}

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      current: ${{ steps.version.outputs.current }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Check if version changed
        id: version
        working-directory: scripts/scripts
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PREVIOUS=$(git show HEAD~1:scripts/scripts/Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        run: rustup toolchain install nightly --profile minimal
        working-directory: scripts

      - name: Build release binary
        working-directory: scripts
        run: cargo build --release --bin mika

      - name: Package binary
        working-directory: scripts/target/release
        run: tar czf "$GITHUB_WORKSPACE/mika-aarch64-apple-darwin.tar.gz" mika

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: mika-aarch64-apple-darwin.tar.gz

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.check-version.outputs.current }}
        run: |
          gh release create "$TAG" mika-aarch64-apple-darwin.tar.gz \
            --generate-notes
