# based on https://github.com/sxyazi/yazi/blob/1a2a18e333de4d92bd83028c808cc9d388b84b60/.github/workflows/test.yml?plain=1#L1
name: Run rust tests

on:
  pull_request: ~
  push:
    branches:
      - main

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup the mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - name: Setup Rust toolchain
        run: rustup toolchain install nightly --profile minimal
        working-directory: scripts

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: scripts

      - name: Build
        run: cargo build --workspace --verbose
        working-directory: scripts

      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2
        # https://nexte.st/docs/installation/pre-built-binaries/
        name: Install cargo-nextest
        with:
          tool: cargo-nextest

      - name: Test
        run: cargo nextest run --workspace --verbose --all-features
        working-directory: scripts
